# Distribution test: beta distribution with custom alpha/beta
# Beta distribution concentrates samples toward the center of the range
node: "Beta distribution test"
prior: 0.50
children:
  - node: "Beta for (alpha=2, beta=5 — skewed toward lr_min)"
    lr_min: 1.5
    lr_max: 5.0
    lr_dist: beta
    lr_alpha: 2
    lr_beta: 5
    evidence_type: for
  - node: "Beta against (alpha=5, beta=2 — skewed toward lr_max)"
    lr_min: 0.1
    lr_max: 0.8
    lr_dist: beta
    lr_alpha: 5
    lr_beta: 2
    evidence_type: against
