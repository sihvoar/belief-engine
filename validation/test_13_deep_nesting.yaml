# Structure test: deep nesting (4 levels)
# Only leaf nodes carry evidence; internal nodes are groupers
node: "Deep nesting test"
prior: 0.50
children:
  - node: "Level 1 branch"
    evidence_type: for
    children:
      - node: "Level 2 sub-evidence A"
        evidence_type: for
        children:
          - node: "Level 3 detail"
            evidence_type: for
            children:
              - node: "Level 4 deep detail"
                lr_min: 0.8
                lr_max: 1.2
                evidence_type: neutral
          - node: "Level 3 supporting evidence"
            lr_min: 1.1
            lr_max: 1.5
            evidence_type: for
      - node: "Level 2 sub-evidence B"
        lr_min: 0.3
        lr_max: 0.7
        evidence_type: against
  - node: "Level 1 counter"
    lr_min: 0.2
    lr_max: 0.5
    evidence_type: against
